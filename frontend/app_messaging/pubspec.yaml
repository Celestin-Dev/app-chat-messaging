name: app_messaging
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.0
  cupertino_icons: ^1.0.9
  go_router: ^17.3.0
  google_sign_in: ^7.2.0
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^7.2.0
  internet_connection_checker_plus: ^3.1.1
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/social/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/splash_screen.png
  android_12:
    color: "#FFFFFF"
    image: assets/splash_screen.png
  web: false