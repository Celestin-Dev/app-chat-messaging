spring.application.name=appchat

#Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chat_app_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:selesy20}
spring.datasource.driver-class-name=org.postgresql.Driver

#JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


# configuration google sign-in
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:186873501820-lm9kjviulqf049euhag83okrmqt4bmt3.apps.googleusercontent.com}

# security configuration
app.secret-key=${APP_SECRET_KEY:sdcv7/lRAuB8yZpmj0hYu8lcI+Iu1V4NP+nDcW42oGk=}
app.expiration-time=${APP_EXPIRATION_TIME:900000}

# serveur (Render fournit sa propre variable PORT automatiquement)
server.port=${PORT:8080}


# ─── Swagger ──────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.celestin.appchat.controllers
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=false
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true
springdoc.default-produces-media-type=application/json