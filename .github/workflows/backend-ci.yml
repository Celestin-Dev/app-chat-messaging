name: Deploy Backend to Render

# Se déclenche à chaque push sur main qui touche au backend,
on:
  push:
    branches: [main]
    paths:
      - "backend/appchat/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: backend/appchat

jobs:
  # ---------- Garde-fou qualité : on ne déploie que si les tests passent ----------
  test:
    runs-on: ubuntu-latest

    # Base PostgreSQL éphémère, disponible uniquement le temps du job
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chat_app_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: selesy20
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - run: mvn test -B

  # ---------- Déclenche le déploiement Render seulement si les tests passent ----------
  deploy:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"